services:
  server:
    build: .
    restart: always
    ports:
      - 1100:3000
    volumes:
      - ./:/server
    depends_on:
      - db
  db:
    image: mysql:9.7.0
    restart: always
    ports:
      - 3308:3306
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_PASS}
      - MYSQL_DATABASE=${DATABASE}
